services:
  sanitag-cli:
    build: .
    image: sanitag-cli:latest
    container_name: sanitag-cli
    working_dir: /app
    environment:
      - MUSIC_DIRECTORY=/app/music
      - MB_EMAIL=${MB_EMAIL}
    volumes:
      - /path/to/your/music:/app/music
      - .:/app
    command: ["--apply", "--auto-approve"]